<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>超级管理员登录</title>
    <meta name="app-version" content="admin-login-auth-20260621-1828" />
    <link rel="icon" href="data:," />
    <style>
      :root {
        --primary: #0f8dad;
        --primary-dark: #086d89;
        --blue: #246fb2;
        --ink: #14202a;
        --muted: #697783;
        --line: #e6edf1;
        --page: #edf5f7;
        --card: #fff;
        --shadow: 0 8px 22px rgba(18, 35, 45, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        background: #eaf2f4;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .phone {
        width: min(100vw, 430px);
        min-height: 100vh;
        margin: 0 auto;
        display: grid;
        align-content: center;
        padding: 24px 14px;
        background: var(--page);
        box-shadow: 0 0 0 1px rgba(20, 35, 45, 0.05), 0 24px 80px rgba(8, 45, 64, 0.18);
      }

      .hero {
        margin-bottom: 12px;
        padding: 18px 16px;
        border-radius: 8px;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--blue));
        box-shadow: var(--shadow);
      }

      .hero h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      .hero p {
        margin: 8px 0 0;
        color: rgba(255, 255, 255, 0.86);
        font-size: 13px;
        line-height: 1.45;
      }

      .card {
        padding: 16px;
        border-radius: 8px;
        background: var(--card);
        box-shadow: var(--shadow);
      }

      .form {
        display: grid;
        gap: 12px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        color: var(--muted);
        font-size: 13px;
      }

      .field input {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        color: var(--ink);
        background: #fff;
      }

      .submit {
        height: 44px;
        margin-top: 4px;
        border-radius: 8px;
        color: #fff;
        background: var(--primary-dark);
        font-weight: 850;
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: calc(38px + env(safe-area-inset-bottom, 0));
        width: max-content;
        max-width: min(86vw, 360px);
        transform: translate(-50%, 14px);
        padding: 10px 14px;
        border-radius: 8px;
        color: #fff;
        background: rgba(17, 37, 48, 0.9);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        font-size: 13px;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    </style>
  </head>
  <body>
    <main class="phone">
      <section class="hero">
        <h1>超级管理员登录</h1>
        <p>身份验证通过后进入运营控制台。</p>
      </section>

      <section class="card">
        <form class="form" id="login-form">
          <div class="field">
            <label for="username">账号</label>
            <input id="username" name="username" autocomplete="username" value="boge" />
          </div>
          <div class="field">
            <label for="password">密码</label>
            <input id="password" name="password" type="password" autocomplete="current-password" autofocus />
          </div>
          <button class="submit" type="submit">登录</button>
        </form>
      </section>
      <div class="toast" role="status" aria-live="polite"></div>
    </main>

    <script>
      const API_BASE = "/api/v1";
      const toast = document.querySelector(".toast");
      let toastTimer;

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1600);
      }

      function targetURL() {
        const params = new URLSearchParams(location.search);
        const redirect = params.get("redirect") || "./admin.html";
        if (/^https?:\/\//i.test(redirect) || redirect.startsWith("//")) {
          return "./admin.html";
        }
        return redirect;
      }

      document.querySelector("#login-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const username = document.querySelector("#username").value.trim();
        const password = document.querySelector("#password").value;
        try {
          const response = await fetch(`${API_BASE}/admin/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok || payload.code >= 400) {
            throw new Error(payload.message || "登录失败");
          }
          localStorage.setItem("zh_admin_token", payload.data.access_token);
          localStorage.setItem("zh_admin_name", payload.data.display_name || payload.data.username || "超级管理员");
          location.replace(targetURL());
        } catch (error) {
          showToast(error.message);
        }
      });
    </script>
  </body>
</html>
