services:
  mysql:
    image: mysql:8.4
    container_name: zhuhai-travel-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zhuhai_root_password}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: zhuhai_travel
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./database/002_island_cruise.sql:/docker-entrypoint-initdb.d/002_island_cruise.sql:ro
      - ./database/003_island_cruise_operations.sql:/docker-entrypoint-initdb.d/003_island_cruise_operations.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: zhuhai-travel-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zhuhai_root_password}
      DB_NAME: zhuhai_travel
      JWT_SECRET: ${JWT_SECRET:-dev-only-zhuhai-travel-jwt-secret}
      TOKEN_TTL_HOURS: 168
      CORS_ALLOWED_ORIGIN: ${CORS_ALLOWED_ORIGIN:-*}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev-only-payment-webhook-secret}
      ISLAND_CRUISE_BASE_URL: ${ISLAND_CRUISE_BASE_URL:-http://121.46.23.81:8035}
      ISLAND_CRUISE_DISTRIBUTOR_CODE: ${ISLAND_CRUISE_DISTRIBUTOR_CODE:-}
      ISLAND_CRUISE_ACCESS_TOKEN: ${ISLAND_CRUISE_ACCESS_TOKEN:-}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    image: nginx:1.27-alpine
    container_name: zhuhai-travel-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HOST_PORT:-8000}:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql_data:
